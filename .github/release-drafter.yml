name-template: '$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '💥 Breaking Changes'
    labels: ['💥 Breaking Change']

  - title: '🔒 Security'
    labels: ['🔒 Security']
    exclude-labels: ['💥 Breaking Change']

  - title: '✨ Features'
    labels: ['✨ Feature']
    exclude-labels: ['💥 Breaking Change', '🔒 Security', '🤖 Dependencies']

  - title: '🐛 Bug Fixes'
    labels: ['🐛 Bug']
    exclude-labels: ['💥 Breaking Change', '🔒 Security', '✨ Feature', '🤖 Dependencies']

  - title: '⚡️ Performance & Refactor'
    labels: ['⚡️ Performance', '🔄 Refactor']
    exclude-labels: ['💥 Breaking Change', '🔒 Security', '✨ Feature', '🐛 Bug', '🤖 Dependencies']

  - title: '🧹 Other Changes'
    collapse-after: 3
    labels:
      - '🧹 Chore'
      - '🤖 Dependencies'
      - '🧪 Testing'
      - '🛡️ Infrastructure / CI'
      - '📚 Documentation'
      - '🎨 Code Style'
    exclude-labels: ['💥 Breaking Change', '🔒 Security', '✨ Feature', '🐛 Bug', '⚡️ Performance', '🔄 Refactor']

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

exclude-contributors:
  - dependabot
  - dependabot[bot]

version-resolver:
  major:
    labels: ['💥 Breaking Change', '🔒 Security']
  minor:
    labels: ['✨ Feature']
  patch:
    labels:
      - '🐛 Bug'
      - '⚡️ Performance'
      - '🔄 Refactor'
      - '🧹 Chore'
      - '🤖 Dependencies'
      - '🧪 Testing'
      - '🛡️ Infrastructure / CI'
      - '📚 Documentation'
      - '🎨 Code Style'
  default: patch

template: |
  $CHANGES

  ## 🔗 Links

  > Нашли баг или есть предложение? Открывайте [issue](https://github.com/$OWNER/$REPOSITORY/issues/new/choose) или присоединяйтесь к [discussions](https://github.com/$OWNER/$REPOSITORY/discussions).

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION