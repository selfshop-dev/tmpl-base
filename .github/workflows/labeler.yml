name: Labeler

on:
  pull_request_target:
    types: [ opened, reopened, synchronize, edited ]
    branches: [ main, dev ]
  pull_request:
    types: [ opened, reopened, synchronize, edited ]
    branches: [ main, dev ]
  issues:
    types: [ opened, edited ]
  issue_comment:
    types: [ created, edited ]

permissions:
  contents: read
  statuses: write
  issues: write
  checks: write
  pull-requests: write

jobs:
  labeler:
    uses: selfshop-dev/lib-default-workflows/.github/workflows/labeler.yml@main
    secrets: inherit